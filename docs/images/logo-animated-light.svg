<!--
  ─────────────────────────────────────────────────────────────────────────────
  15-second loop  (dur="15s" repeatCount="indefinite" on every animated element)
  ─────────────────────────────────────────────────────────────────────────────
  t  0.0 s          OL only visible, barbell elements parked off-screen
  t  0.5–1.05 s     Bar (both rods) blast in from their sides
  t  1.25–1.75 s    Inner plates slam in
  t  1.95–2.45 s    Outer plates + nubs slam in
  t  2.8 s          Rep 1 begins
  t  4.8 s          Rep 2 begins
  t  6.8 s          Rep 3 begins
  t  8.8 s          Rep 4 begins
  t 10.8 s          Rep 5 begins
  t 12.8 s          Reps done, 0.3 s rest
  t 13.1–13.5 s     Outer plates + nubs fly out
  t 13.7–14.1 s     Inner plates fly out
  t 14.3–14.7 s     Rods fly out
  t 14.7–15.0 s     OL alone again → seamless loop

  Slide-in  keySpline: "0 0 0.18 1"  →  blast in, aggressive deceleration (impact)
  Slide-out keySpline: "0.75 0 1 1"  →  slow wind-up, launches away fast

  Rep Y keySplines (per rep, 4 segments):
    lift   "0.15 0 0.35 1"   explosive upward
    hold   "0 0 1 1"         linear (static value)
    lower  "0.35 0 0.65 1"   smooth controlled descent
    rest   "0 0 1 1"         linear (static value)
  ─────────────────────────────────────────────────────────────────────────────
-->

<!-- ══════════════ STATIC OL HEXAGON (never moves) ══════════════ -->

<path fill-rule="evenodd"
  d="M 287,43 L 133,150 L 133,390 L 287,490 Z
     M 234,141 L 178,178 L 178,360 L 234,392 Z"
  fill="#CC0022"/>

