<!-- ══════════════ ANIMATED BARBELL GROUP ══════════════
     Parent handles the rep Y-translation (5 reps, then sits at 0 during dis-assembly).
     Children each carry a full-cycle X-translation for assembly/disassembly.
     ══════════════════════════════════════════════════ -->
<g id="barbell">

  <!--
    Rep Y animation – 15 s cycle, 5 reps encoded directly in keyTimes.

    keyTimes (all ÷ 15):
      0                   → assembly phase start
      0.1867 (2.8 s)      → reps begin
      [per rep: lift-top, hold-end, lower-end, rest-end  ×5]
      0.8533 (12.8 s)     → reps done
      1                   → cycle end

    Pattern per rep (4 segments × 5 reps = 20 splines between reps):
      lift   "0.15 0 0.35 1"
      hold   "0 0 1 1"
      lower  "0.35 0 0.65 1"
      rest   "0 0 1 1"
  -->
  <animateTransform attributeName="transform" type="translate"
    dur="15s" repeatCount="indefinite" calcMode="spline"
    keyTimes="0;
      0.1867;
      0.2160; 0.2293; 0.2827; 0.3200;
      0.3493; 0.3627; 0.4160; 0.4533;
      0.4827; 0.4960; 0.5493; 0.5867;
      0.6160; 0.6293; 0.6827; 0.7200;
      0.7493; 0.7627; 0.8160; 0.8533;
      1"
    values="0,0;
      0,0;
      0,-22; 0,-22; 0,0; 0,0;
      0,-22; 0,-22; 0,0; 0,0;
      0,-22; 0,-22; 0,0; 0,0;
      0,-22; 0,-22; 0,0; 0,0;
      0,-22; 0,-22; 0,0; 0,0;
      0,0"
    keySplines="
      0 0 1 1;
      0.15 0 0.35 1; 0 0 1 1; 0.35 0 0.65 1; 0 0 1 1;
      0.15 0 0.35 1; 0 0 1 1; 0.35 0 0.65 1; 0 0 1 1;
      0.15 0 0.35 1; 0 0 1 1; 0.35 0 0.65 1; 0 0 1 1;
      0.15 0 0.35 1; 0 0 1 1; 0.35 0 0.65 1; 0 0 1 1;
      0.15 0 0.35 1; 0 0 1 1; 0.35 0 0.65 1; 0 0 1 1;
      0 0 1 1"/>

  <!-- ── BAR (rods slide in / fly out simultaneously) ──────────────────── -->

  <!-- Red rod  x=116–126  ← from LEFT  (off=−160) -->
  <g transform="translate(-160,0)">
    <animateTransform attributeName="transform" type="translate"
      dur="15s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0; 0.0333; 0.0700; 0.9533; 0.9800; 1"
      values="-160,0; -160,0; 0,0; 0,0; -160,0; -160,0"
      keySplines="0 0 1 1; 0 0 0.18 1; 0 0 1 1; 0.75 0 1 1; 0 0 1 1"/>
    <rect x="116" y="261" width="10" height="20" fill="#CC0022"/>
  </g>

  <!-- Grey rod  x=378–485  → from RIGHT  (off=+250) -->
  <g transform="translate(250,0)">
    <animateTransform attributeName="transform" type="translate"
      dur="15s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0; 0.0333; 0.0700; 0.9533; 0.9800; 1"
      values="250,0; 250,0; 0,0; 0,0; 250,0; 250,0"
      keySplines="0 0 1 1; 0 0 0.18 1; 0 0 1 1; 0.75 0 1 1; 0 0 1 1"/>
    <rect x="378" y="261" width="107" height="20" fill="#1A1A1A"/>
  </g>

  <!-- ── INNER WEIGHTS ─────────────────────────────────────────────────── -->

  <!-- Red inner plate  x=82–109  ← from LEFT -->
  <g transform="translate(-160,0)">
    <animateTransform attributeName="transform" type="translate"
      dur="15s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0; 0.0833; 0.1167; 0.9133; 0.9400; 1"
      values="-160,0; -160,0; 0,0; 0,0; -160,0; -160,0"
      keySplines="0 0 1 1; 0 0 0.18 1; 0 0 1 1; 0.75 0 1 1; 0 0 1 1"/>
    <rect x="82" y="208" width="27" height="126" fill="#CC0022"/>
  </g>

  <!-- Grey inner plate  x=492–519  → from RIGHT -->
  <g transform="translate(250,0)">
    <animateTransform attributeName="transform" type="translate"
      dur="15s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0; 0.0833; 0.1167; 0.9133; 0.9400; 1"
      values="250,0; 250,0; 0,0; 0,0; 250,0; 250,0"
      keySplines="0 0 1 1; 0 0 0.18 1; 0 0 1 1; 0.75 0 1 1; 0 0 1 1"/>
    <rect x="492" y="208" width="27" height="126" fill="#1A1A1A"/>
  </g>

  <!-- ── OUTER WEIGHTS + NUBS ──────────────────────────────────────────── -->

  <!-- Red outer plate + nub  ← from LEFT -->
  <g transform="translate(-160,0)">
    <animateTransform attributeName="transform" type="translate"
      dur="15s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0; 0.1300; 0.1633; 0.8733; 0.9000; 1"
      values="-160,0; -160,0; 0,0; 0,0; -160,0; -160,0"
      keySplines="0 0 1 1; 0 0 0.18 1; 0 0 1 1; 0.75 0 1 1; 0 0 1 1"/>
    <rect x="51" y="226" width="24" height="91" fill="#CC0022"/>
    <rect x="32" y="261" width="19" height="20" fill="#CC0022"/>
  </g>

  <!-- Grey outer plate + nub  → from RIGHT -->
  <g transform="translate(250,0)">
    <animateTransform attributeName="transform" type="translate"
      dur="15s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0; 0.1300; 0.1633; 0.8733; 0.9000; 1"
      values="250,0; 250,0; 0,0; 0,0; 250,0; 250,0"
      keySplines="0 0 1 1; 0 0 0.18 1; 0 0 1 1; 0.75 0 1 1; 0 0 1 1"/>
    <rect x="526" y="226" width="24" height="91" fill="#1A1A1A"/>
    <rect x="550" y="261" width="19" height="20" fill="#1A1A1A"/>
  </g>

</g>
</svg>
